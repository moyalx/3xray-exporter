# Personal monitoring stack for the 3X-UI exporter: Prometheus + Grafana.
#
# Deploy on the SAME server that runs the exporter (the exporter listens on the
# host at :1819 via host networking). Prometheus reaches it through
# host.docker.internal, which maps to the Docker host gateway.
#
# Quick start:
#   1. cp .env.example .env        # set a Grafana admin password
#   2. docker compose up -d
#   3. Open Grafana:    http://<server-ip>:3000   (login with .env creds)
#      Open Prometheus: http://<server-ip>:9090
#   The Prometheus datasource and a "3X-UI Exporter" dashboard are
#   auto-provisioned, so data shows up with no manual setup.
#
# If your exporter listens on a different host/port, edit the target in
# prometheus/prometheus.yml.

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    user: root
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROM_RETENTION:-30d}
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    # Lets Prometheus reach the exporter running on the host (host networking).
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Public URL of Grafana. MUST include a scheme (http:// or https://) and a
      # trailing slash, e.g. https://mon.example.com/ . A bare hostname like
      # "mon.example.com" is parsed as a URL *path* and causes an infinite
      # /host/host/host/login redirect loop. Defaults to localhost, which is
      # safe for direct IP access (the UI uses relative redirects).
      GF_SERVER_ROOT_URL: ${GF_ROOT_URL:-http://localhost:3000/}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"

volumes:
  prometheus_data:
  grafana_data:
