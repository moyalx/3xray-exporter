# Release pipeline.
#
# Triggered when you push a version tag (with or without a leading "v"):
#   git tag v0.1.0 && git push origin v0.1.0
#
# It performs two jobs:
#   1. github-release : builds the linux/amd64 binary, packages it as a
#                       tarball + checksum, and attaches it to a GitHub Release.
#   2. docker         : builds and pushes a multi-arch image to Docker Hub.
#
# Docker Hub is published from CI on purpose: many networks (incl. the author's)
# block the Docker registry locally, while GitHub-hosted runners reach it fine.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   DOCKERHUB_USERNAME  your Docker Hub username (e.g. moyalx)
#   DOCKERHUB_TOKEN     a Docker Hub access token (Account Settings -> Security)
name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write # needed to create the GitHub Release

env:
  IMAGE_NAME: moyalx/3xray-exporter

jobs:
  github-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      # The tag may be "v0.1.0" or "0.1.0"; strip any leading "v" for the
      # version string embedded in the binary and artifact names.
      - name: Derive version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build linux/amd64 binary
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o dist/3xui-exporter .
          cp README.md dist/
          tar -C dist -czf "dist/3xui-exporter_${VERSION}_linux_amd64.tar.gz" 3xui-exporter README.md
          ( cd dist && sha256sum "3xui-exporter_${VERSION}_linux_amd64.tar.gz" > "3xui-exporter_${VERSION}_checksums.txt" )

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/3xui-exporter_*_linux_amd64.tar.gz
            dist/3xui-exporter_*_checksums.txt

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3 # enables arm64 emulation

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest
